<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cineteca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            max-width: 900px;
            width: 90%;
        }
        .login-banner {
            background: linear-gradient(135deg, #2c1810 0%, #2d2d2d 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 40%;
            text-align: center;
        }
        .login-form-section {
            padding: 60px 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-header h2 { 
            font-size: 1.8rem; 
            color: #333; 
            margin-bottom: 10px; 
        }
        .form-header p { 
            color: #999; 
            font-size: 0.95rem; 
            margin-bottom: 30px; 
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert.show { 
            display: block; 
        }
        .hidden {
            display: none;
        }
        .toggle-link {
            text-align: center; 
            color: #999; 
            font-size: 0.9rem; 
            margin-top: 20px;
        }
        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-container { 
                flex-direction: column; 
            }
            .login-banner { 
                min-width: 100%; 
                padding: 40px 20px; 
            }
            .login-form-section { 
                padding: 40px 20px; 
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <div style="font-size: 4rem; margin-bottom: 20px;">🎬</div>
            <h1>Cineteca Nacional</h1>
            <p>Acceso al Sistema de Gestión</p>
        </div>

        <div class="login-form-section">
            <div id="alert" class="alert"></div>

            <!-- FORMULARIO LOGIN -->
            <div id="login-section">
                <div class="form-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Ingresa tus credenciales para acceder</p>
                </div>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="submit-btn">Iniciar Sesión</button>
                </form>

                <div class="toggle-link">
                    <p>¿No tienes cuenta? 
                        <a onclick="toggleForms()">Regístrate aquí</a>
                    </p>
                </div>
            </div>

            <!-- FORMULARIO REGISTRO -->
            <div id="register-section" class="hidden">
                <div class="form-header">
                    <h2>Crear Cuenta</h2>
                    <p>Te registrarás como Consultor</p>
                </div>

                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-nombre">Nombre Completo</label>
                        <input type="text" id="reg-nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>

                    <p style="text-align: center; color: #48bb78; margin: 15px 0; font-weight: bold;">
                        ✅ Te registrarás como Consultor
                    </p>

                    <button type="submit" class="submit-btn">Registrarse como Consultor</button>
                </form>

                <div class="toggle-link">
                    <p>¿Ya tienes cuenta? 
                        <a onclick="toggleForms()">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // ✅ LOGIN CORRECTO
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.error || 'Usuario o contraseña incorrectos', 'error');
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('usuario', JSON.stringify(data.usuario));

                showAlert('✓ Iniciando sesión...', 'success');

                // ✅ REDIRECCIONA SEGÚN EL ROL
                setTimeout(() => {
                    const rol = data.usuario.rol;
                    const rutas = {
                        'administrador': 'admin-dashboard.html',
                        'editor': 'editor-dashboard.html',
                        'consultor': 'consultor-dashboard.html'
                    };
                    window.location.href = rutas[rol] || 'index.html';
                }, 1200);

            } catch (err) {
                console.error('Error:', err);
                showAlert('Error de conexión', 'error');
            }
        }

        // ✅ REGISTRO CORRECTO
        async function handleRegister(event) {
            event.preventDefault();
            const nombre = document.getElementById('reg-nombre').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.error || 'Error al registrar', 'error');
                    return;
                }

                showAlert('✓ Registrado exitosamente. Iniciando sesión...', 'success');
                
                setTimeout(() => {
                    // Auto login después del registro
                    document.getElementById('email').value = email;
                    document.getElementById('password').value = password;
                    toggleForms();
                }, 1500);

            } catch (err) {
                console.error('Error:', err);
                showAlert('Error de conexión', 'error');
            }
        }

        // ✅ ALTERNAR ENTRE LOGIN Y REGISTRO
        function toggleForms() {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');
            
            loginSection.classList.toggle('hidden');
            registerSection.classList.toggle('hidden');
            
            // Limpiar alerta
            document.getElementById('alert').classList.remove('show');
        }

        // ✅ MOSTRAR ALERTAS
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        // ✅ CARGAR CSS PARA OCULTAR
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = '.hidden { display: none !important; }';
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
